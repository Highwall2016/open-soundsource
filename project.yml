name: OpenSoundSource
options:
  bundleIdPrefix: com.open-soundsource
  deploymentTarget:
    macOS: 14.2

configs:
  Debug: debug
  Release: release
  MASRelease: release

targets:
  OpenSoundSource:
    type: application
    platform: macOS
    deploymentTarget: "14.2"
    info:
      path: App/Info.plist
      properties:
        LSUIElement: YES
        LSApplicationCategoryType: public.app-category.utilities
        NSMicrophoneUsageDescription: "OpenSoundSource needs audio access to capture and route audio from other applications to different output devices. No audio is recorded, stored, or transmitted."
        NSAudioCaptureUsageDescription: "OpenSoundSource captures audio from individual applications using CoreAudio process taps to route their audio to different output devices. No audio is recorded, stored, or transmitted."
    sources:
      - path: App
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/OpenSoundSource.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: 6K376BLA4E
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: App/Info.plist
        MARKETING_VERSION: 1.0
        PRODUCT_BUNDLE_IDENTIFIER: com.open-soundsource.OpenSoundSource
