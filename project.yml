name: OpenSoundSource
options:
  bundleIdPrefix: com.open-soundsource
  deploymentTarget:
    macOS: 14.2

targets:
  OpenSoundSource:
    type: application
    platform: macOS
    deploymentTarget: "14.2"
    info:
      path: App/Info.plist
      properties:
        LSUIElement: YES
    sources:
      - path: App
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/OpenSoundSource.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: App/Info.plist
